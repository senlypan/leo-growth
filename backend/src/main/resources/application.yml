server:
  port: 3000
  servlet:
    context-path: /api

spring:
  application:
    name: leo-growth
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/leo_growth?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.leo.growth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: your_jwt_secret_key_here_please_change_in_production
  expiration: 604800000  # 7 天（毫秒）
  header: Authorization
  prefix: Bearer 

# 微信配置
wechat:
  app-id: your_wechat_app_id
  app-secret: your_wechat_app_secret
  login-url: https://api.weixin.qq.com/sns/jscode2session

# 日志配置
logging:
  level:
    root: INFO
    com.leo.growth: DEBUG
    com.leo.growth.mapper: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
